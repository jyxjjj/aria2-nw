<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>aria2-nw</title>
    <link href="resources/css/cursor.css" rel="stylesheet" rev="stylesheet">
    <link href="resources/css/JetBrainsMono.css" rel="stylesheet" rev="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-size: 16px;
            color: #FFFFFF;
            background-color: #3B3D40;
            text-align: left;
            vertical-align: middle;
        }

        a:link, a:hover, a:focus, a:active, a:visited {
            color: #FFFFFF;
            text-decoration: none;
        }

        ul, li {
            list-style: none;
        }

        .title-bar {
            -webkit-app-region: drag;
            user-select: none;
            height: 30px;
            width: 100%;
            line-height: 30px;
            background-color: #353536;
        }

        .title-bar > a {
            -webkit-app-region: no-drag;
            font-size: 30px;
            line-height: 30px;
            float: right;
        }

        .title-bar > a:hover {
            background-color: #FF0000;
        }

        .sidebar {
        }
    </style>
</head>
<body>
<div class="title-bar">
    <span>&nbsp;</span>
    <span>Aria2-NW</span>
    <a href="javascript:closeMainWindow();">&nbsp;&times;&nbsp;</a>
    <span>&nbsp;</span>
</div>
<div class="sidebar">
    <ul>
        <li><a href="javascript:">任务</a></li>
        <li><a href="javascript:">设置</a></li>
    </ul>
</div>
<script>
    let closeMainWindow = (e) => {
        nw.Window.get().close();
    }
</script>
</body>
</html>
