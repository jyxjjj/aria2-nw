<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>aria2-nw</title>
    <link href="resources/css/bootstrap.min.css" rel="stylesheet" rev="stylesheet">
    <link href="resources/css/font-awesome.css" rel="stylesheet" rev="stylesheet">
    <link href="resources/css/cursor.css" rel="stylesheet" rev="stylesheet">
    <link href="resources/css/JetBrainsMono.css" rel="stylesheet" rev="stylesheet">
    <script src="resources/js/jquery.min.js"></script>
    <script src="resources/js/popper.min.js"></script>
    <script src="resources/js/bootstrap.min.js"></script>
    <link href="resources/css/index.css" rel="stylesheet" rev="stylesheet">
    <link href="resources/css/navbar.css" rel="stylesheet" rev="stylesheet">
    <link href="resources/css/sidebar.css" rel="stylesheet" rev="stylesheet">
    <style>

    </style>
    <script>
        let win = nw.Window.get();
        let runMode = process.versions['nw-flavor'];
        if (runMode === 'sdk') {
            win.showDevTools();
        }
        let minimizeMainWindow = (e) => {
            win.minimize();
        };
        let closeMainWindow = (e) => {
            win.close();
        };
    </script>
</head>
<body>
<nav class="drag navbar shadow">
    <a href="javascript:void(0);">Aria2-NW</a>
    <div class="window-controls">
        <a class="nodrag" href="javascript:minimizeMainWindow();"><i class="fa fa-window-minimize"></i></a>
        <a class="nodrag" href="javascript:alert('暂不支持修改窗口大小');"><i class="fa fa-window-maximize"></i></a>
        <a class="nodrag" href="javascript:closeMainWindow();"><i class="fa fa-window-close"></i></a>
    </div>
</nav>
<div class="sidebar">
    <ul>
        <li class="sidebar-item"><a href="javascript:"><i class="fa fa-tasks"></i> 任务</a></li>
        <li class="sidebar-item"><a href="javascript:"><i class="fa fa-cogs"></i> 设置</a></li>
    </ul>
    <ul>
        <li class="sidebar-item"><a href="javascript:"><i class="fa fa-certificate"></i> 关于</a></li>
        <li class="sidebar-item"><a href="javascript:closeMainWindow();"><i class="fa fa-sign-out"></i> 退出</a></li>
    </ul>
</div>
</body>
</html>
